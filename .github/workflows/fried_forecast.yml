name: 🏄 The Fried Forecast

on:
  # Runs every 2 weeks on Monday at 7am UTC
  schedule:
    - cron: '0 7 1,15 * *'

  # Also lets you trigger it manually from GitHub anytime
  workflow_dispatch:

jobs:
  run-forecast:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 lxml

      - name: Run The Fried Forecast
        env:
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          SF_EMAIL:           ${{ secrets.SF_EMAIL }}
          SF_PASSWORD:        ${{ secrets.SF_PASSWORD }}
        run: python fried_forecast.py
